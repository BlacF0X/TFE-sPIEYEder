<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nouveau post</title>
</head>
<body>

<h1>Créer un post</h1>

<form method="post">

    <p>
        <input type="text" name="title" placeholder="Titre" required>
    </p>

    <p>
        <textarea name="body" placeholder="Contenu" rows="6" required></textarea>
    </p>

    <button type="submit">Publier</button>

</form>
<h2>Caméra en direct</h2>
<img src="http://127.0.0.1:5000/video_feed" width="600">
<a href="/blog">⬅ Retour</a>

</body>
</html>
